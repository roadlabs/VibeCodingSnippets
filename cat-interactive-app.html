            transition: transform 0.3s ease;

        .button {

            color: white;

            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 10px 0;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;

        .button:hover {
            background-color: #45a049;
        }
        .shake {
            animation: shake 0.5s;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            10% { transform: translateX(-10px); }
            20% { transform: translateX(10px); }
            30% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            50% { transform: translateX(-10px); }
            60% { transform: translateX(10px); }
            70% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
            90% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
        .instructions {
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>

    <!-- 创建猫叫声音效 -->
    <audio id="meowSound" preload="auto">
        <!-- 提供多种格式以提高兼容性 -->
        <source src="/api/placeholder/400/320" type="audio/mpeg">
        您的浏览器不支持音频元素。
    </audio>

    <script>
        // 获取元素
        const catImage = document.getElementById('catImage');
        const shakeButton = document.getElementById('shakeButton');
        
        // 创建Web Audio API上下文
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioContext = new AudioContext();
        
        // 创建猫叫声音
        function createMeowSound(frequency, duration) {
            // 创建振荡器
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(frequency * 0.5, audioContext.currentTime + duration * 0.5);
            
            // 设置音量包络
            gainNode.gain.setValueAtTime(0, audioContext.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.5, audioContext.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            // 连接节点
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            // 开始和停止振荡器
            oscillator.start();
            oscillator.stop(audioContext.currentTime + duration);
        }
        
        // 点击猫咪播放声音
        catImage.addEventListener('click', function() {
            // 如果音频上下文被暂停，则恢复
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            // 播放猫叫声
            createMeowSound(800, 0.5);
        });
        
        // 点击摇晃按钮让猫咪摇晃
        shakeButton.addEventListener('click', function() {
            // 添加摇晃动画类
            catImage.classList.add('shake');
            
            // 摇晃完成后移除动画类
            setTimeout(function() {
                catImage.classList.remove('shake');
            }, 500);
            
            // 如果音频上下文被暂停，则恢复
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            // 播放不同的声音（更高频率）
            createMeowSound(1200, 0.4);
        });
    </script>
