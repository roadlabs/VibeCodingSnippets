<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>瓢虫快跑</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a5f23 0%, #0d3b1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            color: white;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 5px;
        }

        .health-bar-container {
            width: 100%;
            max-width: 400px;
            height: 20px;
            background: rgba(0,0,0,0.3);
            border: 2px solid white;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }

        .health-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff6666);
            transition: width 0.1s;
            border-radius: 8px;
        }

        .health-text {
            text-align: center;
            font-size: 14px;
            margin-bottom: 10px;
        }

        #gameCanvas {
            border: 3px solid #8B4513;
            border-radius: 10px;
            background: #90EE90;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            display: block;
            max-width: 100%;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: #FFD700;
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        button#startBtn {
            background: #4CAF50;
            color: white;
        }

        button#restartBtn {
            background: #2196F3;
            color: white;
        }

        .instructions {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 13px;
            line-height: 1.6;
            max-width: 400px;
        }

        .instructions h3 {
            margin-bottom: 8px;
            color: #FFD700;
        }

        .instructions ul {
            margin-left: 20px;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none;
            z-index: 100;
            border: 3px solid #FFD700;
        }

        .game-over h2 {
            color: #ff4444;
            margin-bottom: 15px;
            font-size: 28px;
        }

        .game-over p {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .status {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        #permissionBtn {
            background: #ff9800;
            color: white;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐞 瓢虫快跑</h1>
        <div class="health-text">
            生命值: <span id="healthValue">200</span>/200
        </div>
        <div class="health-bar-container">
            <div class="health-bar" id="healthBar"></div>
        </div>
    </div>

    <canvas id="gameCanvas" width="400" height="300"></canvas>

    <div class="controls">
        <button id="startBtn">开始游戏</button>
        <button id="restartBtn">重新开始</button>
    </div>

    <button id="permissionBtn">启用倾斜控制</button>

    <div class="instructions">
        <h3>游戏说明</h3>
        <ul>
            <li><strong>目标</strong>: 控制瓢虫吃蚜虫，躲避青蛙</li>
            <li><strong>控制</strong>: 倾斜设备移动瓢虫（桌面端用鼠标）</li>
            <li><strong>生命</strong>: 随时间减少，吃蚜虫+50，被青蛙碰到=死亡</li>
            <li><strong>提示</strong>: 蚜虫每0.5秒左右出现一次</li>
        </ul>
    </div>

    <div class="status" id="status">
        点击"开始游戏"开始
    </div>

    <div class="game-over" id="gameOverScreen">
        <h2>游戏结束!</h2>
        <p id="gameOverReason">瓢虫饿死了</p>
        <button onclick="restartGame()">再玩一次</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const healthBar = document.getElementById('healthBar');
        const healthValue = document.getElementById('healthValue');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const permissionBtn = document.getElementById('permissionBtn');
        const status = document.getElementById('status');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const gameOverReason = document.getElementById('gameOverReason');

        // Game state
        let gameRunning = false;
        let health = 200;
        let lastTime = 0;

        // Game objects
        const ladybug = {
            x: 200,
            y: 150,
            width: 40,
            height: 40,
            speed: 0,
            direction: 0,
            color: '#ff0000',
            isDead: false
        };

        const aphid = {
            x: 100,
            y: 100,
            width: 20,
            height: 20,
            visible: false,
            color: '#00aa00'
        };

        const frog = {
            x: 300,
            y: 200,
            width: 35,
            height: 35,
            color: '#228B22'
        };

        // Sprites as emojis
        const sprites = {
            ladybug: '🐞',
            deadLadybug: '💀',
            aphid: '🐜',
            frog: '🐸'
        };

        // Orientation data
        let orientation = { alpha: 0, beta: 0, gamma: 0 };
        let hasOrientation = false;
        const speedFactor = 80;

        // Draw functions
        function clearCanvas() {
            ctx.fillStyle = '#90EE90';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawRect(obj, color) {
            ctx.fillStyle = color;
            ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
        }

        function drawText(obj, emoji) {
            ctx.font = `${obj.height}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(emoji, obj.x + obj.width/2, obj.y + obj.height/2);
        }

        function drawLadybug() {
            if (ladybug.isDead) {
                drawText(ladybug, sprites.deadLadybug);
            } else {
                drawText(ladybug, sprites.ladybug);
            }
        }

        function drawAphid() {
            if (aphid.visible) {
                drawText(aphid, sprites.aphid);
            }
        }

        function drawFrog() {
            drawText(frog, sprites.frog);
        }

        // Game logic
        function updateHealth(delta) {
            health = Math.max(0, health - delta);
            healthBar.style.width = (health / 200 * 100) + '%';
            healthValue.textContent = Math.round(health);

            if (health <= 0 && gameRunning) {
                endGame('饿死了');
            }
        }

        function moveLadybug(dt) {
            if (ladybug.isDead) return;

            // Calculate velocity from orientation
            const velocityX = orientation.gamma * speedFactor * dt / 1000;
            const velocityY = orientation.beta * speedFactor * dt / 1000;

            ladybug.x += velocityX;
            ladybug.y += velocityY;

            // Boundary check
            ladybug.x = Math.max(0, Math.min(canvas.width - ladybug.width, ladybug.x));
            ladybug.y = Math.max(0, Math.min(canvas.height - ladybug.height, ladybug.y));
        }

        function moveAphid(dt) {
            if (!aphid.visible) {
                // 5% chance to reappear every dt
                if (Math.random() < 0.05 * dt / 1000) {
                    aphid.visible = true;
                    aphid.x = Math.random() * (canvas.width - aphid.width);
                    aphid.y = Math.random() * (canvas.height - aphid.height);
                }
                return;
            }

            // Small chance to change direction
            if (Math.random() < 0.2 * dt / 1000) {
                const angle = Math.random() * Math.PI * 2;
                aphid.dx = Math.cos(angle) * 30;
                aphid.dy = Math.sin(angle) * 30;
            }

            aphid.x += aphid.dx * dt / 1000;
            aphid.y += aphid.dy * dt / 1000;

            // Boundary bounce
            if (aphid.x <= 0 || aphid.x >= canvas.width - aphid.width) {
                aphid.dx *= -1;
                aphid.x = Math.max(0, Math.min(canvas.width - aphid.width, aphid.x));
            }
            if (aphid.y <= 0 || aphid.y >= canvas.height - aphid.height) {
                aphid.dy *= -1;
                aphid.y = Math.max(0, Math.min(canvas.height - aphid.height, aphid.y));
            }
        }

        function moveFrog(dt) {
            // 10% chance to chase ladybug directly
            if (Math.random() < 0.1 * dt / 1000) {
                const dx = ladybug.x + ladybug.width/2 - (frog.x + frog.width/2);
                const dy = ladybug.y + ladybug.height/2 - (frog.y + frog.height/2);
                const angle = Math.atan2(dy, dx);
                frog.dx = Math.cos(angle) * 40;
                frog.dy = Math.sin(angle) * 40;
            }

            frog.x += frog.dx * dt / 1000;
            frog.y += frog.dy * dt / 1000;

            // Boundary bounce
            if (frog.x <= 0 || frog.x >= canvas.width - frog.width) {
                frog.dx *= -1;
                frog.x = Math.max(0, Math.min(canvas.width - frog.width, frog.x));
            }
            if (frog.y <= 0 || frog.y >= canvas.height - frog.height) {
                frog.dy *= -1;
                frog.y = Math.max(0, Math.min(canvas.height - frog.height, frog.y));
            }
        }

        function checkCollision(obj1, obj2) {
            return obj1.x < obj2.x + obj2.width &&
                   obj1.x + obj1.width > obj2.x &&
                   obj1.y < obj2.y + obj2.height &&
                   obj1.y + obj1.height > obj2.y;
        }

        function handleCollisions() {
            // Ladybug vs Aphid
            if (aphid.visible && checkCollision(ladybug, aphid)) {
                health = Math.min(200, health + 50);
                healthBar.style.width = (health / 200 * 100) + '%';
                healthValue.textContent = Math.round(health);
                aphid.visible = false;
                status.textContent = '吃到了蚜虫！生命值+50';
            }

            // Ladybug vs Frog
            if (!ladybug.isDead && checkCollision(ladybug, frog)) {
                endGame('被青蛙吃掉了');
            }
        }

        function gameLoop(timestamp) {
            if (!gameRunning) return;

            const dt = timestamp - lastTime;
            lastTime = timestamp;

            // Update
            updateHealth(dt / 1000 * 5); // Lose 5 health per second
            moveLadybug(dt);
            moveAphid(dt);
            moveFrog(dt);
            handleCollisions();

            // Draw
            clearCanvas();
            drawAphid();
            drawFrog();
            drawLadybug();

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            if (gameRunning) return;

            // Request motion permission on iOS if needed
            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                permissionBtn.style.display = 'block';
                permissionBtn.onclick = async () => {
                    try {
                        const response = await DeviceOrientationEvent.requestPermission();
                        if (response === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            permissionBtn.style.display = 'none';
                            startGameInternal();
                        }
                    } catch (e) {
                        alert('需要陀螺仪权限才能使用倾斜控制');
                    }
                };
                return;
            }

            startGameInternal();
        }

        function startGameInternal() {
            // Reset game state
            health = 200;
            ladybug.x = canvas.width/2 - ladybug.width/2;
            ladybug.y = canvas.height/2 - ladybug.height/2;
            ladybug.isDead = false;
            ladybug.direction = 0;
            ladybug.speed = 0;

            aphid.visible = false;
            aphid.dx = 30;
            aphid.dy = 30;

            frog.x = 50;
            frog.y = 50;
            frog.dx = 20;
            frog.dy = 20;

            gameRunning = true;
            gameOverScreen.style.display = 'none';
            startBtn.textContent = '游戏中...';
            startBtn.disabled = true;
            status.textContent = '游戏进行中 - 倾斜设备控制瓢虫';

            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function endGame(reason) {
            gameRunning = false;
            ladybug.isDead = true;
            gameOverReason.textContent = reason;
            gameOverScreen.style.display = 'block';
            startBtn.textContent = '开始游戏';
            startBtn.disabled = false;
            status.textContent = '游戏结束 - ' + reason;
        }

        function restartGame() {
            gameOverScreen.style.display = 'none';
            startGame();
        }

        // Orientation handler
        function handleOrientation(event) {
            orientation.beta = event.beta || 0;   // -180 to 180 (front/back tilt)
            orientation.gamma = event.gamma || 0; // -90 to 90 (left/right tilt)
        }

        // Mouse control for desktop
        let mouseTarget = null;
        canvas.addEventListener('mousedown', (e) => {
            if (!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            mouseTarget = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!gameRunning || !mouseTarget) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // Move ladybug towards mouse
            const dx = mouseX - ladybug.x;
            const dy = mouseY - ladybug.y;
            const distance = Math.sqrt(dx*dx + dy*dy);

            if (distance > 5) {
                ladybug.x += (dx / distance) * 5;
                ladybug.y += (dy / distance) * 5;

                // Clamp to bounds
                ladybug.x = Math.max(0, Math.min(canvas.width - ladybug.width, ladybug.x));
                ladybug.y = Math.max(0, Math.min(canvas.height - ladybug.height, ladybug.y));
            }
        });

        canvas.addEventListener('mouseup', () => {
            mouseTarget = null;
        });

        canvas.addEventListener('mouseleave', () => {
            mouseTarget = null;
        });

        // Check if device orientation is available
        if ('DeviceOrientationEvent' in window) {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS 13+ needs permission request
                if (gameRunning) {
                    permissionBtn.style.display = 'block';
                }
            } else {
                // Android and older iOS
                window.addEventListener('deviceorientation', handleOrientation);
                hasOrientation = true;
            }
        } else {
            status.textContent = '设备不支持方向传感器，请使用鼠标控制';
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', restartGame);

        // Initial draw
        clearCanvas();
        drawLadybug();
        drawFrog();
    </script>
</body>
</html>
