<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>你好猫咪</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: manipulation;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 20px;
        }

        .label {
            font-size: 24px;
            color: #ff6b6b;
            margin-bottom: 30px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .cat-button {
            width: 200px;
            height: 200px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            overflow: hidden;
            margin: 0 auto 30px;
            display: block;
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
        }

        .cat-button:active {
            transform: scale(0.95);
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .cat-button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
            min-height: 50px;
        }

        .status .detected {
            color: #28a745;
            font-weight: bold;
        }

        .status .waiting {
            color: #ffc107;
            font-weight: bold;
        }

        .status .error {
            color: #dc3545;
            font-weight: bold;
        }

        .instructions {
            margin-top: 20px;
            padding: 15px;
            background: #e7f3ff;
            border-radius: 10px;
            font-size: 13px;
            color: #0066cc;
            text-align: left;
            line-height: 1.6;
        }

        .instructions h3 {
            margin-bottom: 10px;
            font-size: 14px;
        }

        .instructions ul {
            margin-left: 20px;
        }

        .permission-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .permission-btn:hover {
            background: #45a049;
        }

        .permission-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        /* Cat emoji fallback if image fails */
        .cat-emoji {
            font-size: 120px;
            line-height: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="label">可爱的猫咪</div>

        <button class="cat-button" id="catBtn">
            <div class="cat-emoji">🐱</div>
        </button>

        <div class="status" id="status">
            点击猫咪按钮播放声音并振动<br>
            摇晃设备也会播放声音
        </div>

        <div class="instructions">
            <h3>使用说明：</h3>
            <ul>
                <li>点击猫咪图片：播放猫叫 + 振动</li>
                <li>摇晃手机：播放猫叫声</li>
                <li>桌面端：点击按钮工作，摇晃不可用</li>
            </ul>
        </div>

        <button class="permission-btn" id="permissionBtn" style="display: none;">
            启用动作传感器
        </button>
    </div>

    <audio id="meowSound" preload="auto">
        <!-- We'll generate a simple meow sound using Web Audio API -->
    </audio>

    <script>
        const catBtn = document.getElementById('catBtn');
        const status = document.getElementById('status');
        const permissionBtn = document.getElementById('permissionBtn');

        // Audio context for generating meow sound
        let audioContext = null;
        let isVibrationSupported = false;

        // Check vibration support
        if ('vibrate' in navigator) {
            isVibrationSupported = true;
            updateStatus('设备支持振动功能');
        } else {
            updateStatus('设备不支持振动（桌面端常见）');
        }

        // Initialize audio context on user interaction
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Generate a cat meow sound using Web Audio API
        function playMeow() {
            initAudio();

            const now = audioContext.currentTime;

            // Create oscillator for meow sound
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            // Meow frequency sweep (around 500-700Hz)
            oscillator.frequency.setValueAtTime(600, now);
            oscillator.frequency.exponentialRampToValueAtTime(400, now + 0.2);
            oscillator.frequency.exponentialRampToValueAtTime(500, now + 0.4);

            // Volume envelope
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);

            oscillator.type = 'sine';
            oscillator.start(now);
            oscillator.stop(now + 0.5);

            updateStatus('喵呜！');

            // Also try to play audio file if available
            const audio = document.getElementById('meowSound');
            if (audio.src) {
                audio.currentTime = 0;
                audio.play().catch(() => {});
            }
        }

        // Vibrate function
        function vibrate(duration = 500) {
            if (isVibrationSupported) {
                navigator.vibrate(duration);
                updateStatus('振动中...');
            }
        }

        // Click handler
        catBtn.addEventListener('click', () => {
            playMeow();
            vibrate(500);
        });

        // Update status message
        function updateStatus(msg) {
            status.innerHTML = msg;
        }

        // Shake detection
        let lastX = 0, lastY = 0, lastZ = 0;
        let shakeThreshold = 15;
        let lastShakeTime = 0;
        let shakeCooldown = 1000; // 1 second cooldown

        function handleMotion(event) {
            const acceleration = event.accelerationIncludingGravity;
            if (!acceleration) return;

            const currentX = acceleration.x || 0;
            const currentY = acceleration.y || 0;
            const currentZ = acceleration.z || 0;

            const deltaX = Math.abs(currentX - lastX);
            const deltaY = Math.abs(currentY - lastY);
            const deltaZ = Math.abs(currentZ - lastZ);

            if ((deltaX > shakeThreshold && deltaY > shakeThreshold) ||
                (deltaX > shakeThreshold && deltaZ > shakeThreshold) ||
                (deltaY > shakeThreshold && deltaZ > shakeThreshold)) {

                const now = Date.now();
                if (now - lastShakeTime > shakeCooldown) {
                    lastShakeTime = now;
                    playMeow();
                    if (isVibrationSupported) {
                        vibrate(300);
                    }
                }
            }

            lastX = currentX;
            lastY = currentY;
            lastZ = currentZ;
        }

        // Request motion permission for iOS 13+
        async function requestMotionPermission() {
            if (typeof DeviceMotionEvent !== 'undefined' &&
                typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceMotionEvent.requestPermission();
                    if (response === 'granted') {
                        window.addEventListener('devicemotion', handleMotion);
                        permissionBtn.style.display = 'none';
                        updateStatus('动作传感器已启用，摇晃设备试试！');
                    } else {
                        updateStatus('<span class="error">动作传感器权限被拒绝</span>');
                    }
                } catch (e) {
                    updateStatus('<span class="error">请求权限失败: ' + e.message + '</span>');
                }
            }
        }

        // Check if motion events are supported
        if ('DeviceMotionEvent' in window) {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                // iOS 13+ needs permission
                if (isVibrationSupported) {
                    permissionBtn.style.display = 'block';
                    permissionBtn.addEventListener('click', requestMotionPermission);
                }
            } else {
                // Android and older iOS
                window.addEventListener('devicemotion', handleMotion);
                updateStatus('动作传感器已就绪，摇晃设备试试！');
            }
        }

        // Try to load actual cat image
        const catImg = catBtn.querySelector('.cat-emoji');
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function() {
            catBtn.innerHTML = '';
            catBtn.appendChild(img);
        };
        img.onerror = function() {
            // Keep emoji fallback
        };
        // Try to load from common kitty.png location
        img.src = 'kitty.png';

        // Also try to load meow sound
        const audio = document.getElementById('meowSound');
        // We could embed a base64 meow sound here, but Web Audio API is enough

        console.log('🐱 Hello Cat app loaded!');
    </script>
</body>
</html>
