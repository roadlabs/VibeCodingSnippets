<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://vitejs.dev/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Skill Builder - Visual Mindmap with Markdown Nodes</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/reactflow@11.10.4/dist/reactflow.min.js"></script>
    <script src="https://unpkg.com/zustand@4.5.0/dist/zustand.umd.js"></script>
    <script src="https://unpkg.com/lucide-react@0.323.0/dist/umd/lucide-react.js"></script>
    <script src="https://unpkg.com/clsx@2.1.0/dist/clsx.umd.js"></script>
    <script src="https://unpkg.com/tailwind-merge@2.2.1/dist/tailwind-merge.umd.js"></script>
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/reactflow@11.10.4/dist/style.css" />

  <body>
    <div id="root"></div>

<script type="text/babel">
const { createRoot } = ReactDOM;
const { clsx } = clsx;
const { twMerge } = tailwindMerge;
const { create } = zustand;
const { 
  ReactFlow, 
  Controls, 
  Background, 
  MiniMap, 
  Handle, 
  Position, 
  addEdge, 
  applyNodeChanges, 
  applyEdgeChanges 
} = ReactFlow;

// --- Types / Constants ---
const NODE_TYPES = {
  ROOT: 'root',
  FEATURE: 'feature',
  SECTION: 'section',
  MARKDOWN: 'markdown',
};

const NODE_COLORS = {
  root: '#3b82f6',
  feature: '#10b981',
  parameter: '#f59e0b',
  example: '#8b5cf6',
  tool: '#ef4444',
  description: '#6b7280',
  section: '#06b6d4',
  markdown: '#8b5cf6',
};

// --- Store ---
const initialNodes = [
  {
    id: 'root',
    type: NODE_TYPES.ROOT,
    position: { x: 250, y: 200 },
    data: { 
      title: 'My New Skill',
      content: '# My New Skill\n\nThis is my awesome OpenClaw AgentSkill.\n\nDescribe what this skill does here using **Markdown**. This is a standalone version you can run directly in your browser.',
      label: 'My New Skill',
      skillName: 'my-new-skill'
    },
  },
];

const initialEdges = [];

function getDefaultTitleForType(type, increment) {
  switch (type) {
    case NODE_TYPES.ROOT:
      return 'My Skill';
    case NODE_TYPES.FEATURE:
      return \`Feature \${increment}\`;
    case NODE_TYPES.SECTION:
      return \`Section \${increment}\`;
    case NODE_TYPES.MARKDOWN:
      return \`Notes \${increment}\`;
    default:
      return \`\${type} \${increment}\`;
  }
}

function getDefaultContentForType(type) {
  switch (type) {
    case NODE_TYPES.ROOT:
      return '# My Skill\n\nBrief description of what this skill does.\n\n**Skill Name:** `my-skill`  \n**Author:** Your Name\n\n## Overview\n\nWrite your skill description here using Markdown.';
    case NODE_TYPES.FEATURE:
      return '## Feature: Feature Name\n\n**Description:**  \nDescribe what this feature does in detail.\n\n**Usage:**\n```\n/skill-name command\n```';
    case NODE_TYPES.SECTION:
      return '## Section Title\n\nThis section groups related content together.\n\nAdd multiple related nodes as children to this section.';
    case NODE_TYPES.MARKDOWN:
      return 'Add any free-form content here using **Markdown** format.\n\n- You can use bullet lists\n- **bold text**, *italic*\n- `inline code`\n- [links](https://example.com)';
    default:
      return 'Add your content here in Markdown format.';
  }
}

const useSkillStore = create((set, get) => ({
  nodes: initialNodes,
  edges: initialEdges,
  selectedNodeId: null,

  onNodesChange: (changes) => {
    set({
      nodes: applyNodeChanges(changes, get().nodes),
    });
  },

  onEdgesChange: (changes) => {
    set({
      edges: applyEdgeChanges(changes, get().edges),
    });
  },

  onConnect: (connection) => {
    set({
      edges: addEdge({ ...connection, animated: true }, get().edges),
    });
  },

  setSelectedNode: (nodeId) => {
    set({ selectedNodeId: nodeId });
  },

  updateNodeData: (nodeId, newData) => {
    set({
      nodes: get().nodes.map(node => 
        node.id === nodeId 
          ? { ...node, data: { ...node.data, ...newData } }
          : node
      ),
    });
  },

  addChildNode: (parentId, nodeType) => {
    const parentNode = get().nodes.find(n => n.id === parentId);
    const increment = get().nodes.filter(n => n.type === nodeType).length + 1;
    const nodeId = \`\${nodeType}-\${increment}\`;
    
    let position;
    if (parentNode) {
      const offsetX = 300;
      const offsetY = increment * 80 - ((get().nodes.filter(n => n.type === nodeType).length) * 40);
      position = { 
        x: parentNode.position.x + offsetX, 
        y: parentNode.position.y + offsetY 
      };
    } else {
      position = { x: 100, y: 100 };
    }

    const defaultContent = getDefaultContentForType(nodeType);
    
    const newNode = {
      id: nodeId,
      type: nodeType,
      position,
      data: {
        title: getDefaultTitleForType(nodeType, increment),
        content: defaultContent,
        label: getDefaultTitleForType(nodeType, increment),
      },
    };

    set({
      nodes: [...get().nodes, newNode],
    });

    if (parentId) {
      set({
        edges: [...get().edges, { 
          id: \`\${parentId}-\${nodeId}\`, 
          source: parentId, 
          target: nodeId, 
          animated: true 
        }],
      });
    }

    return nodeId;
  },

  deleteSelectedNode: () => {
    const { selectedNodeId, nodes, edges } = get();
    if (!selectedNodeId || selectedNodeId === 'root') return;

    set({
      nodes: nodes.filter(n => n.id !== selectedNodeId),
      edges: edges.filter(e => e.source !== selectedNodeId && e.target !== selectedNodeId),
      selectedNodeId: null,
    });
  },

  reset: () => {
    set({
      nodes: initialNodes,
      edges: initialEdges,
      selectedNodeId: null,
    });
  },

  loadFromJson: (data) => {
    set({
      nodes: data.nodes || initialNodes,
      edges: data.edges || initialEdges,
      selectedNodeId: null,
    });
  },
}));

// --- Utilities for generation ---
// Find root node
function findRoot(nodes) {
  return nodes.find(n => n.type === NODE_TYPES.ROOT);
}

// Get all children recursively (build the document hierarchy)
function collectAllNodesByType(nodes, edges, rootId = null) {
  const result = {
    root: null,
    features: [],
    sections: [],
    markdown: [],
    all: [...nodes]
  };
  
  nodes.forEach(node => {
    switch (node.type) {
      case NODE_TYPES.ROOT:
        result.root = node;
        break;
      case NODE_TYPES.FEATURE:
        result.features.push(node);
        break;
      case NODE_TYPES.SECTION:
        result.sections.push(node);
        break;
      case NODE_TYPES.MARKDOWN:
        result.markdown.push(node);
        break;
    }
  });
  
  return result;
}

// Generate SKILL.md content by aggregating all nodes' Markdown content
function generateSkillMd(root, collected) {
  const skillName = root.data.skillName || root.data.name || 'unnamed-skill';
  const rootContent = root.data.content || '';
  
  let content = \`---
name: \${skillName}
description: Extract from root content
---

\${rootContent}

\`;

  // Add sections
  if (collected.sections.length > 0) {
    collected.sections.forEach(section => {
      content += \`\\n\${section.data.content}\\n\\n\`;
    });
  }

  // Add features
  if (collected.features.length > 0) {
    content += '\n## Features\n\n';
    collected.features.forEach(feature => {
      content += \`\${feature.data.content}\\n\\n\`;
    });
  }

  // Add additional markdown content
  if (collected.markdown.length > 0) {
    collected.markdown.forEach(md => {
      content += \`\${md.data.content}\\n\\n\`;
    });
  }

  // Add usage section if not already present
  if (!content.includes('## Usage') && !content.includes('# Usage')) {
    content += \`\\n## Usage\\n\\nUse with \`/\${skillName} [command]\`\\n\\n\`;
  }

  return content.trim();
}

// Generate package.json
function generatePackageJson(root) {
  const skillName = root.data.skillName || root.data.name || 'unnamed-skill';
  const description = root.data.content 
    ? root.data.content.split('\n')[0].replace(/^#\s*/, '').replace(/\*/g, '') 
    : 'OpenClaw AgentSkill';
  
  const pkg = {
    name: skillName,
    version: '1.0.0',
    description,
    main: 'index.js',
    dependencies: {},
    keywords: ['openclaw', 'skill'],
    author: '',
    license: 'MIT'
  };

  return JSON.stringify(pkg, null, 2);
}

// Generate index.js skeleton based on features
function generateIndexJs(root, features) {
  const skillName = root.data.skillName || root.data.name || 'unnamed-skill';
  
  let code = \`/**
 * \${skillName} - OpenClaw AgentSkill
 * Auto-generated by openclaw-skill-builder (mindmap)
 */

\${features.length > 0 ? '// Import necessary tools here\\n' : ''}

export default async function run(params, context) {
  const { message, args, toolCall } = context;
  
\`;

  if (features.length === 0) {
    code += \`  // Add your feature logic here\\n\`;
    code += \`  return { text: "Hello from \${skillName}!" };\\n\`;
  } else {
    code += \`  // Route based on command/feature\\n\`;
    code += \`  const command = args[0];\\n\\n\`;
    
    features.forEach((feature, index) => {
      const featureName = (feature.data.title || \`feature\${index + 1}\`)
        .toLowerCase()
        .replace(/\s+/g, '-');
      
      if (index === 0) {
        code += \`  if (command === '\${featureName}') {\\n\`;
      } else {
        code += \`  } else if (command === '\${featureName}') {\\n\`;
      }
      
      code += \`    // \${feature.data.title}\\n\`;
      code += \`    // TODO: Implement \${featureName}\\n\`;
      code += \`    return { text: "Implementing: \${feature.data.title}..." };\\n\`;
      code += \`  }\\n\`;
    });

    code += \`\\n  return { text: "Unknown command. Available: \${features.map(f => (f.data.title || '').toLowerCase().replace(/\\s+/g, '-')).filter(Boolean).join(', ')}" };\\n\`;
  }

  code += '}\n';
  return code;
}

// Generate README.md
function generateReadme(root) {
  const skillName = root.data.skillName || root.data.name || 'OpenClaw Skill';
  const description = root.data.content 
    ? root.data.content.split('\n')[0].replace(/^#\s*/, '').replace(/\*/g, '') 
    : 'OpenClaw AgentSkill';
  
  return \`# \${skillName}

\${description}

## Installation

Place this directory in your OpenClaw skills folder:

\`\`\`
cp -r \${skillName} ~/.openclaw/workspace/skills/
\`\`\`

## Usage

Use in OpenClaw with:

\`\`\`
/\${skillName} [command]
\`\`\`

## Description

Auto-generated by OpenClaw Skill Builder (visual mindmap editor)
\`;
}

// Main export - generate all files
function generateSkillFiles(nodes, edges) {
  const root = findRoot(nodes);
  if (!root) {
    throw new Error('No root node found');
  }

  const collected = collectAllNodesByType(nodes, edges);
  const features = collected.features;

  return {
    skillName: root.data.skillName || root.data.name || 'openclaw-skill',
    skillMd: generateSkillMd(root, collected),
    packageJson: generatePackageJson(root),
    indexJs: generateIndexJs(root, features),
    readme: generateReadme(root)
  };
}

// Generate all files in structure for zip
function generateAll(nodes, edges) {
  const { skillName, skillMd, packageJson, indexJs, readme } = generateSkillFiles(nodes, edges);
  
  const files = {
    'SKILL.md': skillMd,
    'package.json': packageJson,
    'index.js': indexJs,
    'README.md': readme
  };

  return {
    skillName: skillName || 'openclaw-skill',
    files
  };
}

generateSkillFiles.all = generateAll;
generateSkillFiles.generateSkillMd = generateSkillMd;
generateSkillFiles.generatePackageJson = generatePackageJson;
generateSkillFiles.generateIndexJs = generateIndexJs;

const generateSkillFilesAll = generateAll;

// --- Components ---
// Simple markdown parser for preview
const renderMarkdown = (text) => {
  if (!text) return '';
  // Very basic rendering for preview
  return text
    .replace(/^# (.*$)/gm, '<h1>$1</h1>')
    .replace(/^## (.*$)/gm, '<h2>$2</h2>')
    .replace(/^### (.*$)/gm, '<h3>$3</h3>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/\n/g, '<br />');
};

const iconMap = {
  [NODE_TYPES.ROOT]: React.createElement(lucideReact.BookOpen, {size: 16}),
  [NODE_TYPES.MARKDOWN]: React.createElement(lucideReact.FileText, {size: 16}),
  [NODE_TYPES.FEATURE]: React.createElement(lucideReact.Play, {size: 16}),
  [NODE_TYPES.SECTION]: React.createElement(lucideReact.LayoutTemplate, {size: 16}),
};

function CustomNode({ data, selected, type, id }) {
  const color = NODE_COLORS[type] || '#666';
  const [isEditing, setIsEditing] = React.useState(false);
  const [localTitle, setLocalTitle] = React.useState(data.title || data.label || '');
  const [localContent, setLocalContent] = React.useState(data.content || '');
  const titleRef = React.useRef(null);
  const contentRef = React.useRef(null);

  React.useEffect(() => {
    setLocalTitle(data.title || data.label || '');
    setLocalContent(data.content || '');
  }, [data.title, data.content, data]);

  React.useEffect(() => {
    if (isEditing && selected) {
      if (titleRef.current) {
        titleRef.current.focus();
      } else if (contentRef.current) {
        contentRef.current.focus();
      }
    }
  }, [isEditing, selected]);

  const handleTitleChange = (e) => {
    setLocalTitle(e.target.value);
  };

  const handleContentChange = (e) => {
    setLocalContent(e.target.value);
  };

  const handleBlur = () => {
    data.title = localTitle;
    data.content = localContent;
    data.label = localTitle;
    setIsEditing(false);
  };

  const handleDoubleClick = () => {
    setIsEditing(true);
  };

  const getMinWidth = () => {
    switch (type) {
      case NODE_TYPES.ROOT: return '300px';
      case NODE_TYPES.DESCRIPTION: return '280px';
      case NODE_TYPES.EXAMPLE: return '280px';
      default: return '220px';
    }
  };

  const getMinHeight = () => {
    switch (type) {
      case NODE_TYPES.ROOT: return '180px';
      case NODE_TYPES.DESCRIPTION: return '150px';
      case NODE_TYPES.EXAMPLE: return '160px';
      default: return '120px';
    }
  };

  const currentIcon = iconMap[type] || React.createElement(lucideReact.MoreVertical, {size: 16});

  return (
    React.createElement('div', {
      className: clsx(
        'rounded-lg shadow-md border-2 bg-white transition-all relative',
        selected ? 'border-blue-500 ring-2 ring-blue-200' : 'border-gray-200',
      ),
      style: { 
        borderTopColor: color, 
        borderTopWidth: 4,
        minWidth: getMinWidth(),
        minHeight: getMinHeight(),
      },
      onDoubleClick: handleDoubleClick,
    },
      React.createElement(Handle, {type: "target", position: Position.Left, className: "w-3 h-3 bg-gray-400"}),
      
      // Editor Mode
      isEditing && (
        React.createElement('div', {className: "p-3 space-y-2"},
          React.createElement('input', {
            ref: titleRef,
            type: "text",
            value: localTitle,
            onChange: handleTitleChange,
            onBlur: handleBlur,
            placeholder: "Node title...",
            className: "w-full px-2 py-1 border-b border-blue-300 focus:outline-none focus:border-blue-500 font-semibold text-gray-800 bg-transparent"
          }),
          React.createElement('textarea', {
            ref: contentRef,
            value: localContent,
            onChange: handleContentChange,
            onBlur: handleBlur,
            placeholder: "Write your content in Markdown...",
            className: "w-full px-2 py-1 border rounded focus:outline-none focus:ring-1 focus:ring-blue-500 text-sm resize-none",
            style: { minHeight: '100px' }
          })
        )
      ),

      // Preview Mode
      !isEditing && (
        React.createElement('div', {className: "p-3"},
          React.createElement('div', {className: "flex items-center gap-2 mb-2 pb-2 border-b border-gray-100"},
            React.createElement('div', {className: "p-1 rounded", style: { backgroundColor: color + '20', color }},
              currentIcon
            ),
            React.createElement('div', {className: "font-semibold text-sm text-gray-800 truncate flex-1"},
              localTitle || type
            ),
            React.createElement(lucideReact.Edit3, {size: 14, className: "text-gray-400 opacity-50"})
          ),
          React.createElement('div', { 
            className: "text-sm text-gray-700 overflow-auto max-h-[300px] prose prose-sm",
            style: { fontSize: '0.875rem', lineHeight: '1.4' },
            dangerouslySetInnerHTML: { __html: renderMarkdown(localContent) }
          }),
          !localContent && (
            React.createElement('div', {className: "text-gray-400 text-xs italic mt-2"},
              "Double-click to edit Markdown content..."
            )
          )
        )
      ),

      React.createElement('div', {className: "absolute -top-2 -right-2"},
        React.createElement('span', {className: "text-[10px] px-1.5 py-0.5 bg-gray-100 border border-gray-300 rounded-full text-gray-600"},
          type
        )
      ),

      React.createElement(Handle, {type: "source", position: Position.Right, className: "w-3 h-3 bg-gray-400"})
    )
  );
}

const nodeTypeInfo = {
  [NODE_TYPES.ROOT]: { label: 'Root Skill', icon: React.createElement(lucideReact.BookOpen, {size: 18}), description: 'Main skill node' },
  [NODE_TYPES.FEATURE]: { label: 'Feature', icon: React.createElement(lucideReact.Play, {size: 18}), description: 'Feature/functionality' },
  [NODE_TYPES.SECTION]: { label: 'Section', icon: React.createElement(lucideReact.LayoutTemplate, {size: 18}), description: 'Section grouping' },
  [NODE_TYPES.MARKDOWN]: { label: 'Markdown', icon: React.createElement(lucideReact.FileText, {size: 18}), description: 'Free-form content' },
};

function Sidebar() {
  const { selectedNodeId, addChildNode, deleteSelectedNode, nodes, edges, reset } = useSkillStore();
  const fileInputRef = React.useRef(null);

  const handleAddNode = (type) => {
    if (selectedNodeId) {
      addChildNode(selectedNodeId, type);
    } else {
      addChildNode(null, type);
    }
  };

  const handleExportJson = () => {
    const blob = new Blob([JSON.stringify({ nodes, edges }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'skill-editor-save.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const handleDownloadZip = async () => {
    try {
      const { skillName, files } = generateSkillFilesAll(nodes, edges);
      const zip = new JSZip();
      
      Object.entries(files).forEach(([filename, content]) => {
        zip.file(filename, content);
      });

      const blob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = \`\${skillName || 'openclaw-skill'}.zip\`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (error) {
      console.error('Failed to generate zip:', error);
      alert('Error generating zip: ' + error.message);
    }
  };

  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (event) => {
      try {
        const data = JSON.parse(event.target.result);
        if (data.nodes && data.edges) {
          useSkillStore.getState().loadFromJson(data);
        } else {
          alert('Invalid save file');
        }
      } catch (error) {
        alert('Failed to parse JSON: ' + error.message);
      }
    };
    reader.readAsText(file);
  };

  return (
    React.createElement('div', {className: "w-64 bg-gray-50 border-r h-full flex flex-col"},
      React.createElement('div', {className: "p-4 border-b bg-white"},
        React.createElement('h1', {className: "font-bold text-lg text-gray-800"}, "OpenClaw Skill Builder"),
        React.createElement('p', {className: "text-xs text-gray-500 mt-1"}, "Mindmap with Markdown nodes (Standalone)")
      ),

      React.createElement('div', {className: "p-4 border-b bg-white"},
        React.createElement('h2', {className: "font-semibold text-sm text-gray-700 mb-3"}, "Add Node"),
        React.createElement('div', {className: "space-y-2"},
          Object.entries(nodeTypeInfo).map(([type, info]) => (
            React.createElement('button', {
              key: type,
              onClick: () => handleAddNode(type),
              className: "w-full flex items-center gap-3 px-3 py-2 rounded hover:bg-gray-100 transition-colors border border-gray-200 group"
            },
              React.createElement('div', {
                className: "p-1.5 rounded", 
                style: { backgroundColor: NODE_COLORS[type] + '20', color: NODE_COLORS[type] }
              },
                info.icon
              ),
              React.createElement('div', {className: "text-left"},
                React.createElement('div', {className: "text-sm font-medium text-gray-700 group-hover:text-gray-900"},
                  info.label
                ),
                React.createElement('div', {className: "text-xs text-gray-500"}, info.description)
              ),
              React.createElement(lucideReact.Plus, {size: 14, className: "ml-auto opacity-50"})
            )
          ))
        )
      ),

      React.createElement('div', {className: "p-4 border-b bg-white"},
        React.createElement('h2', {className: "font-semibold text-sm text-gray-700 mb-3"}, "Actions"),
        React.createElement('div', {className: "space-y-2"},
          React.createElement('button', {
            onClick: deleteSelectedNode,
            disabled: !selectedNodeId || selectedNodeId === 'root',
            className: "w-full flex items-center gap-2 px-3 py-2 rounded border border-red-200 hover:bg-red-50 text-red-600 disabled:opacity-50 disabled:cursor-not-allowed"
          },
            React.createElement(lucideReact.Trash2, {size: 16}),
            React.createElement('span', {className: "text-sm"}, "Delete Selected")
          )
        )
      ),

      React.createElement('div', {className: "p-4 border-b bg-white"},
        React.createElement('h2', {className: "font-semibold text-sm text-gray-700 mb-3"}, "Project"),
        React.createElement('div', {className: "space-y-2"},
          React.createElement('input', {
            ref: fileInputRef,
            type: "file",
            accept: ".json",
