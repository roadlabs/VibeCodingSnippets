// --- Node Types Definition (7 types as requested) ---
const NODE_TYPES = {
  ROOT: 'root',
  FEATURES: 'features',
  USAGE: 'usage',
  COMMANDS: 'commands',
  PARAMETERS: 'parameters',
  EXAMPLES: 'examples',
  NOTES: 'notes',
};

    bgColor: '#607D8B20',

  }
};

// --- Initial State ---
const STORAGE_KEY = 'openclaw-skill-builder-data';

const loadInitialData = () => {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      return JSON.parse(saved);
    }
  } catch (e) {
    console.warn('Failed to load from localStorage', e);
  }

  return {
    nodes: [
      {
        id: 'root-1',
        type: NODE_TYPES.ROOT,
        position: { x: 250, y: 200 },
        data: { 
          title: 'Root',
          content: NODE_DEFINITIONS[NODE_TYPES.ROOT].defaultContent
        },
      },
    ],
    edges: [],
  };
};

// --- Store with Zustand ---
const useSkillStore = create((set, get) => ({
  nodes: loadInitialData().nodes,
  edges: loadInitialData().edges,
  selectedNodeId: null,

  // Persist to localStorage
  persist: () => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        nodes: get().nodes,
        edges: get().edges
      }));
    } catch (e) {
      console.error('Failed to save to localStorage', e);
    }
  },

  onNodesChange: (changes) => {
    set({
      nodes: applyNodeChanges(changes, get().nodes),
    });
    get().persist();
  },

  onEdgesChange: (changes) => {
    set({
      edges: applyEdgeChanges(changes, get().edges),
    });
    get().persist();
  },

  onConnect: (connection) => {
    set({
      edges: addEdge({ ...connection, animated: true }, get().edges),
    });
    get().persist();
  },

  setSelectedNode: (nodeId) => {
    set({ selectedNodeId: nodeId });
  },

  updateNodeData: (nodeId, newData) => {
    set({
      nodes: get().nodes.map(node => 
        node.id === nodeId 
          ? { ...node, data: { ...node.data, ...newData } }
          : node
      ),
    });
    get().persist();
  },

  addNode: (type, parentId = null) => {
    const typeCount = get().nodes.filter(n => n.type === type).length + 1;
    const nodeId = `${type}-${typeCount}`;
    
    let position;
    if (parentId) {
      const parent = get().nodes.find(n => n.id === parentId);
      if (parent) {
        // Count how many children this parent already has to space them vertically
        const childCount = get().edges.filter(e => e.source === parentId).length;
        position = { 
          x: parent.position.x + 350, 
          y: parent.position.y + childCount * 100 - 50 
        };
      } else {
        position = { x: 100 + Math.random() * 300, y: 100 + Math.random() * 300 };
      }
    } else {
      position = { x: 100 + Math.random() * 300, y: 100 + Math.random() * 300 };
    }

    const def = NODE_DEFINITIONS[type];
    const newNode = {
      id: nodeId,
      type: type,
      position,
      data: {
        title: def.defaultTitle,
        content: def.defaultContent
      },
    };

    set({
      nodes: [...get().nodes, newNode],
    });

    if (parentId) {
      set({
        edges: [...get().edges, { 
          id: `${parentId}-${nodeId}`, 
          source: parentId, 
          target: nodeId, 
          animated: true 
        }],
      });
    }

    get().persist();
    return nodeId;
  },

  deleteSelectedNode: () => {
    const { selectedNodeId, nodes, edges } = get();
    if (!selectedNodeId) return;
    if (selectedNodeId === 'root-1' && nodes.length === 1) return;

    set({
      nodes: nodes.filter(n => n.id !== selectedNodeId),
      edges: edges.filter(e => e.source !== selectedNodeId && e.target !== selectedNodeId),
      selectedNodeId: null,
    });
    get().persist();
  },

  reset: () => {
    const initial = loadInitialData();
    set({
      nodes: initial.nodes,
      edges: initial.edges,
      selectedNodeId: null,
    });
    get().persist();
  },

  autoLayout: () => {
    // Simple auto layout - root on left, children cascade to right
    const root = get().nodes.find(n => n.type === NODE_TYPES.ROOT);
    if (!root) return;
    
    const visited = new Set([root.id]);
    const queue = [root];
    let level = 1;
    const levelWidth = 400;
    const verticalSpacing = 120;
    
    while (queue.length > 0) {
      const levelSize = queue.length;
      const startY = -(levelSize - 1) * verticalSpacing / 2;
      
      for (let i = 0; i < levelSize; i++) {
        const node = queue.shift();
        const children = get().edges
          .filter(e => e.source === node.id)
          .map(e => get().nodes.find(n => n.id === e.target));
        
        children.forEach((child, idx) => {
          if (child && !visited.has(child.id)) {
            visited.add(child.id);
            const newX = root.position.x + level * levelWidth;
            const newY = root.position.y + startY + i * verticalSpacing + (idx - children.length / 2) * 80;
            child.position = { x: newX, y: newY };
            queue.push(child);
          }
        });
      }
      level++;
    }
    
    set({ nodes: [...get().nodes] });
    get().persist();
  },
}));

// --- Markdown Renderer (simple) ---
const renderMarkdown = (text) => {
  if (!text) return '';
  let html = text
    .replace(/^### (.*$)/gm, '<h3>$1</h3>')
    .replace(/^## (.*$)/gm, '<h2>$1</h2>')
    .replace(/^# (.*$)/gm, '<h1>$1</h1>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\n/g, '<br />');
  
  // Handle basic tables
  html = html.replace(/^\|.*\|$/gm, (line) => {
    return '<table class="border-collapse border border-gray-300 text-sm"><tr>' + 
      line.split('|').filter(c => c.trim()).map(cell => 
        `<td class="border border-gray-300 px-2 py-1">${cell.trim()}</td>`
      ).join('') + '</tr></table>';
  });
  
  return html;
};

// --- Custom Node Component ---
function CustomNode({ data, selected, type, id }) {
  const def = NODE_DEFINITIONS[type];
  const color = def.color;
  const bgColor = def.bgColor;
  const [isEditing, setIsEditing] = React.useState(false);
  const [localTitle, setLocalTitle] = React.useState(data.title || def.defaultTitle);
  const [localContent, setLocalContent] = React.useState(data.content || def.defaultContent);
  const updateNodeData = useSkillStore(state => state.updateNodeData);

  React.useEffect(() => {
    setLocalTitle(data.title || def.defaultTitle);
    setLocalContent(data.content || def.defaultContent);
  }, [data.title, data.content, data, def]);

  const handleBlur = () => {
    updateNodeData(id, { title: localTitle, content: localContent });
    setIsEditing(false);
  };

  const handleDoubleClick = () => {
    setIsEditing(true);
  };

  const Icon = def.icon;

  return (
    <div 
      className={clsx(
        'rounded-lg shadow-md border-2 bg-white transition-all relative',
        selected ? 'border-blue-500 ring-2 ring-blue-200' : 'border-gray-200',
      )}
      style={{ 
        borderTopColor: color, 
        borderTopWidth: 4,
        minWidth: '260px',
        minHeight: '140px',
      }}
      onDoubleClick={handleDoubleClick}
    >
      <Handle type="target" position={Position.Left} className="w-3 h-3 bg-gray-400" />
      
      {isEditing ? (
        <div className="p-3 space-y-2">
          <input 
            type="text"
            value={localTitle}
            onChange={(e) => setLocalTitle(e.target.value)}
            onBlur={handleBlur}
            placeholder="Node title..."
            className="w-full px-2 py-1 border-b border-blue-300 focus:outline-none focus:border-blue-500 font-semibold text-gray-800 bg-transparent"
            autoFocus
          />
          <textarea 
            value={localContent}
            onChange={(e) => setLocalContent(e.target.value)}
            onBlur={handleBlur}
            placeholder="Write your content in Markdown..."
            className="w-full px-2 py-1 border rounded focus:outline-none focus:ring-1 focus:ring-blue-500 text-sm resize-vertical"
            style={{ minHeight: '100px' }}
          />
        </div>
      ) : (
        <div className="p-3">
          <div className="flex items-center gap-2 mb-2 pb-2 border-b border-gray-100">
            <div className="p-1 rounded" style={{ backgroundColor: bgColor, color: color }}>
              <Icon size={16} />
            </div>
            <div className="font-semibold text-sm text-gray-800 truncate flex-1">
              {localTitle}
            </div>
            <lucideReact.Edit3 size={14} className="text-gray-400 opacity-50" />
          </div>
          <div 
            className="text-sm text-gray-700 overflow-auto max-h-[300px]"
            style={{ fontSize: '0.875rem', lineHeight: '1.5' }}
            dangerouslySetInnerHTML={{ __html: renderMarkdown(localContent) }}
          />
          {!localContent && (
            <div className="text-gray-400 text-xs italic mt-2">
              Double-click to edit Markdown content...
            </div>
          )}
        </div>
      )}

      <div className="absolute -top-2 -right-2">
        <span className="text-[10px] px-1.5 py-0.5 bg-white border border-gray-300 rounded-full text-gray-600 shadow-sm">
          {def.name}
        </span>
      </div>

      <Handle type="source" position={Position.Right} className="w-3 h-3 bg-gray-400" />
    </div>
  );
}

// --- Code Generation ---
function findRoot(nodes) {
  return nodes.find(n => n.type === NODE_TYPES.ROOT);
}

function collectAllNodesByType(nodes) {
  const result = {
    root: null,
    features: [],
    usage: [],
    commands: [],
    parameters: [],
    examples: [],
    notes: [],
    all: [...nodes]
  };
  
  nodes.forEach(node => {
    switch (node.type) {
      case NODE_TYPES.ROOT:
        result.root = node;
        break;
      case NODE_TYPES.FEATURES:
        result.features.push(node);
        break;
      case NODE_TYPES.USAGE:
        result.usage.push(node);
        break;
      case NODE_TYPES.COMMANDS:
        result.commands.push(node);
        break;
      case NODE_TYPES.PARAMETERS:
        result.parameters.push(node);
        break;
      case NODE_TYPES.EXAMPLES:
        result.examples.push(node);
        break;
      case NODE_TYPES.NOTES:
        result.notes.push(node);
        break;
    }
  });
  
  return result;
}

function extractSkillName(root) {
  // Try to extract from first heading
  const firstLine = (root.data.content || '').split('\n')[0];
  const match = firstLine.match(/^#\s*(.*)$/);
  if (match && match[1]) {
    return match[1]
      .toLowerCase()
      .replace(/\s+/g, '-')
      .replace(/[^a-z0-9-]/g, '');
  }
  return (root.data.title || 'openclaw-skill')
    .toLowerCase()
    .replace(/\s+/g, '-')
    .replace(/[^a-z0-9-]/g, '');
}

function extractDescription(root) {
  const content = root.data.content || '';
  const lines = content.split('\n');
  for (const line of lines) {
    if (line.trim() && !line.startsWith('#') && !line.startsWith('-')) {
      return line.trim().replace(/[#*`]/g, '');
    }
  }
  return 'OpenClaw AgentSkill';
}

function generateSkillMd(root, collected) {
  let content = '';
  
  // Root content is the base
  content += `${root.data.content || ''}\n\n`;
  
  // Add each section in order
  [
    { key: 'features', title: '## 功能特性' },
    { key: 'usage', title: '## 使用方法' },
    { key: 'commands', title: '## 命令说明' },
    { key: 'parameters', title: '## 参数说明' },
    { key: 'examples', title: '## 使用示例' },
    { key: 'notes', title: '## 备注' },
  ].forEach(({ key, title }) => {
    if (collected[key].length > 0) {
      collected[key].forEach(node => {
        // If the node content doesn't already have a heading matching the type, add it
        const hasHeading = node.data.content.split('\n').some(line => 
          line.startsWith('# ') || line.startsWith('## ') || line.startsWith('### ')
        );
        if (!hasHeading) {
          content += `${title}\n\n`;
        }
        content += `${node.data.content}\n\n`;
      });
    }
  });

  return content.trim();
}

function generatePackageJson(skillName, description) {
  return JSON.stringify({
    name: skillName,
    version: '1.0.0',
    description,
    main: 'index.js',
    dependencies: {},
    keywords: ['openclaw', 'skill'],
    author: '',
    license: 'MIT'
  }, null, 2);
}

function generateIndexJs(skillName, commands) {
  let code = `/**
 * ${skillName} - OpenClaw AgentSkill
 * Auto-generated by OpenClaw Skill Builder (ReactFlow)
 */

export default async function run(params, context) {
  const { message, args, toolCall } = context;
  const command = args[0] || '';

`;

  if (commands.length === 0) {
    code += `  // Add your command logic here\n`;
    code += `  return { text: "Hello from ${skillName}!" };\n`;
  } else {
    commands.forEach((cmd, index) => {
      const cmdName = (cmd.data.title || 'command')
        .toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^a-z0-9-]/g, '');
      
      if (index === 0) {
        code += `  if (command === '${cmdName}') {\n`;
      } else {
        code += `  } else if (command === '${cmdName}') {\n`;
      }
      code += `    // ${cmd.data.title}\n`;
      code += `    // TODO: Implement this command\n`;
      code += `    return { text: "Running: ${cmd.data.title}" };\n`;
      code += `  }\n`;
    });

    const allCommands = commands.map(cmd => 
      (cmd.data.title || 'command')
        .toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^a-z0-9-]/g, '')
    ).filter(Boolean);

    code += `\n  return { text: "Available commands: ${allCommands.join(', ')}" };\n`;
  }

  code += '}\n';
  return code;
}

function generateReadme(skillName, description) {
  return `# ${skillName}

${description}

## Installation

Place this directory in your OpenClaw skills folder:

\`\`\`
cp -r ${skillName} ~/.openclaw/workspace/skills/
\`\`\`

## Usage

Use in OpenClaw with:

\`\`\`
/${skillName} [command]
\`\`\`

## Description

Auto-generated by OpenClaw Skill Builder (visual mindmap editor)
`;
}

function generateSkillFiles(nodes, edges) {
  const collected = collectAllNodesByType(nodes);
  const root = collected.root;
  
  if (!root) {
    throw new Error('No Root node found');
  }

  const skillName = extractSkillName(root);
  const description = extractDescription(root);

  return {
    skillName,
    files: {
      'SKILL.md': generateSkillMd(root, collected),
      'package.json': generatePackageJson(skillName, description),
      'index.js': generateIndexJs(skillName, collected.commands),
      'README.md': generateReadme(skillName, description),
    }
  };
}

// --- Main App Component ---
function App() {
  const { 
    nodes, 
    edges, 
    selectedNodeId,
    onNodesChange, 
    onEdgesChange, 
    onConnect,
    addNode,
    deleteSelectedNode,
    reset,
    autoLayout
  } = useSkillStore();

  const nodeTypes = React.useMemo(() => ({
    [NODE_TYPES.ROOT]: CustomNode,
    [NODE_TYPES.FEATURES]: CustomNode,
    [NODE_TYPES.USAGE]: CustomNode,
    [NODE_TYPES.COMMANDS]: CustomNode,
    [NODE_TYPES.PARAMETERS]: CustomNode,
    [NODE_TYPES.EXAMPLES]: CustomNode,
    [NODE_TYPES.NOTES]: CustomNode,
  }), []);

  const handleAddNode = (type) => {
    addNode(type, selectedNodeId);
  };

  const handleExportZip = async () => {
    try {
      const { skillName, files } = generateSkillFiles(nodes, edges);
      const zip = new JSZip();
      
      Object.entries(files).forEach(([filename, content]) => {
        zip.file(filename, content);
      });

      const blob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${skillName}.zip`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (error) {
      console.error('Failed to generate zip:', error);
      alert('Error generating ZIP: ' + error.message);
    }
  };

  const handleExportJson = () => {
    const blob = new Blob([JSON.stringify({ nodes, edges }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'skill-builder-save.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const handleTest = () => {
    try {
      const { skillName, files } = generateSkillFiles(nodes, edges);
      let output = `Generated Skill: ${skillName}\n\n`;
      Object.entries(files).forEach(([filename, content]) => {
        output += `=== ${filename} ===\n${content}\n\n`;
      });
      alert(output);
    } catch (error) {
      alert('Test error: ' + error.message);
    }
  };

  const reactFlowStyle = {
    background: '#f8f8f8',
    width: '100%',
    height: '100%',
  };

  return (
    <div className="flex h-full w-full">
      {/* Left Sidebar - Add Nodes */}
      <div className="w-64 bg-white border-r shadow-sm flex flex-col z-10 mt-16">
        <div className="p-4 border-b bg-gray-50">
          <h1 className="font-bold text-lg text-gray-800">OpenClaw Skill Builder</h1>
          <p className="text-xs text-gray-500 mt-1">ReactFlow Visual Editor</p>
        </div>

        <div className="p-3 border-b">
          <h2 className="font-semibold text-sm text-gray-700 mb-3">添加节点</h2>
          <div className="space-y-2">
            {Object.entries(NODE_DEFINITIONS).map(([type, def]) => {
              const Icon = def.icon;
              return (
                <button
                  key={type}
                  onClick={() => handleAddNode(type)}
                  className="w-full flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-50 transition-colors border border-gray-200 group"
                  style={{ borderLeftColor: def.color, borderLeftWidth: 4 }}
                >
                  <div className="p-1.5 rounded" style={{ backgroundColor: def.bgColor, color: def.color }}>
                    <Icon size={16} />
                  </div>
                  <div className="text-left flex-1">
                    <div className="text-sm font-medium text-gray-700 group-hover:text-gray-900">
                      {def.name}
                    </div>
                  </div>
                  <lucideReact.Plus size={14} className="opacity-50" />
                </button>
              );
            })}
          </div>
        </div>

        <div className="p-3 border-b">
          <h2 className="font-semibold text-sm text-gray-700 mb-3">编辑操作</h2>
          <div className="space-y-2">
            <button
              onClick={deleteSelectedNode}
              disabled={!selectedNodeId}
              className="w-full flex items-center gap-2 px-3 py-2 rounded border border-red-200 hover:bg-red-50 text-red-600 disabled:opacity-50 disabled:cursor-not-allowed"
            >
              <lucideReact.Trash2 size={16} />
              <span className="text-sm">删除选中节点</span>
            </button>
            <button
              onClick={autoLayout}
              className="w-full flex items-center gap-2 px-3 py-2 rounded border border-blue-200 hover:bg-blue-50 text-blue-600"
            >
              <lucideReact.Layout size={16} />
              <span className="text-sm">自动排列布局</span>
            </button>
            <button
              onClick={reset}
              className="w-full flex items-center gap-2 px-3 py-2 rounded border border-gray-200 hover:bg-gray-50 text-gray-600"
            >
              <lucideReact.RefreshCw size={16} />
              <span className="text-sm">重置画布</span>
            </button>
          </div>
        </div>

        <div className="p-3 border-b">
          <h2 className="font-semibold text-sm text-gray-700 mb-3">保存/导入</h2>
          <div className="space-y-2">
            <button
              onClick={handleExportJson}
              className="w-full flex items-center gap-2 px-3 py-2 rounded border border-gray-200 hover:bg-gray-50 text-gray-600"
            >
              <lucideReact.Download size={16} />
              <span className="text-sm">导出项目 JSON</span>
            </button>
          </div>
        </div>

        <div className="flex-1"></div>

        <div className="p-3 text-xs text-gray-400 text-center border-t">
          All dependencies via CDN • Single file • Works offline
        </div>
      </div>

      {/* Main ReactFlow Canvas */}
      <div className="flex-1 relative">
        <ReactFlow
          nodes={nodes}
          edges={edges}
          onNodesChange={onNodesChange}
          onEdgesChange={onEdgesChange}
          onConnect={onConnect}
          onNodeClick={(_, node) => useSkillStore.getState().setSelectedNode(node.id)}
          onPaneClick={() => useSkillStore.getState().setSelectedNode(null)}
          nodeTypes={nodeTypes}
          fitView
          attributionPosition="bottom-right"
          style={reactFlowStyle}
        >
          <Background />
          <Controls />
          <MiniMap 
            nodeColor={(node) => NODE_DEFINITIONS[node.type].color}
            className="bg-white border rounded shadow-lg"
          />
        </ReactFlow>
      </div>

      {/* Right Bottom - Deploy & Test Panel */}
      <div className="fixed bottom-4 right-4 z-20 w-72 bg-white rounded-xl shadow-xl border p-4 space-y-3">
        <h3 className="font-bold text-gray-800 flex items-center gap-2">
          <lucideReact.Upload size={18} />
          部署测试
        </h3>
        <p className="text-xs text-gray-500">
          自动生成 ZIP 包，包含 SKILL.md、index.js、package.json 和 README.md
        </p>
        <div className="space-y-2">
          <button
            onClick={handleTest}
            className="w-full flex items-center justify-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium"
          >
            <lucideReact.TestTube size={18} />
            测试生成
          </button>
          <button
            onClick={handleExportZip}
            className="w-full flex items-center justify-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-semibold"
          >
            <lucideReact.DownloadCloud size={18} />
            导出 ZIP
          </button>
        </div>
        <p className="text-[10px] text-gray-400 text-center">
          所有更改自动保存到浏览器 localStorage
        </p>
      </div>
    </div>
  );
}

// --- Render ---
const root = createRoot(document.getElementById('root'));
root.render(<App />);
</script>
  </body>
</html>
